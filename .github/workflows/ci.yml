name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v6
    - name: Build release
      run: swift build -c release
    - name: Smoke test
      run: .build/release/screen-follow version
    - name: CLI test
      run: |
        .build/release/screen-follow status
        .build/release/screen-follow help
